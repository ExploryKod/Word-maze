server {
    server_name word-maze-demo.work.gd www.word-maze-demo.work.gd;

    client_max_body_size 10M;

    # Proxy static via Gunicorn (ubuntu user). alias + /home/ubuntu often gives 403 for www-data.
    location /static/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/word-maze-demo.work.gd/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/word-maze-demo.work.gd/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot


}
server {
    if ($host = www.word-maze-demo.work.gd) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    if ($host = word-maze-demo.work.gd) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name word-maze-demo.work.gd www.word-maze-demo.work.gd;
    return 404; # managed by Certbot




}