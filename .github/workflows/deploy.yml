name: Deploy Word-maze to VPS

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Build Tailwind on the runner (VPS does not need Node/npm)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Build Tailwind CSS
        working-directory: app
        run: |
          npm ci
          npm run tailwind

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_FAR_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync files to VPS
        run: |
          rsync -az --delete \
            --exclude '.git' \
            --exclude '.github' \
            --exclude 'node_modules' \
            --exclude '.venv' \
            --exclude '.env' \
            --exclude 'game.db' \
            --exclude '*.db' \
            ./ ubuntu@${{ secrets.VPS_HOST }}:${{ vars.VPS_PATH }}

      - name: Create .env on VPS
        env:
          ENV_FILE_CONTENT: ${{ secrets.ENV_FILE_CONTENT }}
        run: |
          printf '%s' "$ENV_FILE_CONTENT" | ssh ubuntu@${{ secrets.VPS_HOST }} "
            cat > '${{ vars.VPS_PATH }}/.env'
          "

      - name: Install Python deps and restart service
        run: |
          ssh ubuntu@${{ secrets.VPS_HOST }} "
            cd '${{ vars.VPS_PATH }}' &&
            python3 -m venv .venv &&
            .venv/bin/pip install --upgrade pip &&
            .venv/bin/pip install -r requirements.txt &&
            sudo cp deploy/word-maze.service /etc/systemd/system/word-maze.service &&
            sudo systemctl daemon-reload &&
            sudo systemctl restart word-maze &&
            sudo systemctl is-active --quiet word-maze
          "
